      annotations:
        argocd/app-name: cert-manager
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/name=cert-manager"
        backstage.io/kubernetes-namespace: cert-manager
      tags:
        - security
        - tls
        - cncf-graduated
        - cert-manager
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: kubeauto-idp
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: backstage-portal
      title: Backstage Developer Portal
      description: Internal developer portal (v1.48.0). Custom image with GitHub auth, Kubernetes plugin, and ArgoCD plugin. Static file catalog with 2 scaffolder templates.
      annotations:
