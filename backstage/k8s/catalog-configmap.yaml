      annotations:
        argocd/app-name: loki
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/name=loki"
        backstage.io/kubernetes-namespace: monitoring
      tags:
        - observability
        - logging
        - grafana
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: kubeauto-idp
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
