      annotations:
        argocd/app-name: tempo
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/name=tempo"
        backstage.io/kubernetes-namespace: monitoring
      tags:
        - observability
        - tracing
        - grafana
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: kubeauto-idp
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
