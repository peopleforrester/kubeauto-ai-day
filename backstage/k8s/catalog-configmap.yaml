  deploy-service-template.yaml: |
    apiVersion: scaffolder.backstage.io/v1beta3
    kind: Template
    metadata:
      name: deploy-service
      title: Deploy a New Service
      description: |
        Creates a fully operational service in the apps namespace with everything needed
        to run on the platform: Kyverno-compliant Deployment, Service, ALB Ingress with
        TLS, emptyDir volumes for nginx-based images, and OTel telemetry egress. All
        generated manifests pass platform security policies out of the box.
      tags:
        - kubernetes
        - argocd
        - recommended
    spec:
      owner: platform-team
      type: service
      parameters:
        - title: Service Details
          required:
            - name
            - image
          properties:
            name:
              title: Service Name
              type: string
              description: Unique name for the service (lowercase, alphanumeric with hyphens)
              pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
              ui:autofocus: true
            description:
              title: Description
              type: string
              description: Brief description of what this service does
            owner:
              title: Owner Team
              type: string
              description: Team that owns this service
              default: platform-team
              enum:
                - platform-team
            image:
              title: Container Image
              type: string
              description: "Full image reference (e.g. docker.io/library/nginx:1.27)"
              ui:placeholder: "docker.io/library/nginx:1.27"
        - title: Resource & Networking Configuration
          properties:
            replicas:
              title: Replicas
              type: integer
              description: Number of pod replicas
              default: 2
              minimum: 1
              maximum: 5
            port:
              title: Container Port
              type: integer
              description: Port the container listens on
              default: 8080
            exposeExternally:
              title: Expose via ALB Ingress
              type: boolean
              description: Create an ALB Ingress with TLS at <name>.ai-enhanced-devops.com
              default: true
            isNginxBased:
              title: Nginx-based Image
              type: boolean
              description: Add writable cache volumes required for nginx running as non-root
              default: false
            cpuRequest:
              title: CPU Request
              type: string
              description: CPU request for each pod
              default: 100m
              enum:
                - 50m
                - 100m
                - 250m
                - 500m
            memoryRequest:
              title: Memory Request
              type: string
              description: Memory request for each pod
              default: 128Mi
              enum:
                - 64Mi
                - 128Mi
                - 256Mi
                - 512Mi
            cpuLimit:
              title: CPU Limit
              type: string
              description: CPU limit for each pod
              default: 500m
              enum:
                - 250m
                - 500m
                - "1"
            memoryLimit:
              title: Memory Limit
              type: string
              description: Memory limit for each pod
              default: 256Mi
              enum:
                - 128Mi
                - 256Mi
                - 512Mi
                - 1Gi
      steps:
        - id: generate-manifests
          name: Generate Kubernetes Manifests
          action: debug:log
          input:
            message: |
              Generated platform-compliant manifests for ${{ parameters.name }}:

              ---
              # Deployment (Kyverno-compliant: non-root, resource limits, probes, labels)
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ${{ parameters.name }}
                namespace: apps
                labels:
                  app: ${{ parameters.name }}
                  version: v1.0.0
                  app.kubernetes.io/name: ${{ parameters.name }}
                  app.kubernetes.io/part-of: kubeauto-idp
              spec:
                replicas: ${{ parameters.replicas }}
                selector:
                  matchLabels:
                    app: ${{ parameters.name }}
                template:
                  metadata:
                    labels:
                      app: ${{ parameters.name }}
                      version: v1.0.0
                  spec:
                    securityContext:
                      runAsNonRoot: true
                      runAsUser: 1000
                      fsGroup: 1000
                    containers:
                      - name: ${{ parameters.name }}
                        image: ${{ parameters.image }}
                        ports:
                          - containerPort: ${{ parameters.port }}
                        resources:
                          requests:
                            cpu: ${{ parameters.cpuRequest }}
                            memory: ${{ parameters.memoryRequest }}
                          limits:
                            cpu: ${{ parameters.cpuLimit }}
                            memory: ${{ parameters.memoryLimit }}
                        volumeMounts:
                          - name: tmp
                            mountPath: /tmp
                          # Include these for nginx-based images:
                          # - name: nginx-cache
                          #   mountPath: /var/cache/nginx
                          # - name: nginx-run
                          #   mountPath: /var/run
                        readinessProbe:
                          httpGet:
                            path: /
                            port: ${{ parameters.port }}
                          initialDelaySeconds: 5
                          periodSeconds: 10
                        livenessProbe:
                          httpGet:
                            path: /
                            port: ${{ parameters.port }}
                          initialDelaySeconds: 10
                          periodSeconds: 30
                        securityContext:
                          allowPrivilegeEscalation: false
                          capabilities:
                            drop: ["ALL"]
                    volumes:
                      - name: tmp
                        emptyDir: {}
                      # Include these for nginx-based images:
                      # - name: nginx-cache
                      #   emptyDir: {}
                      # - name: nginx-run
                      #   emptyDir: {}
              ---
              # Service
              apiVersion: v1
              kind: Service
              metadata:
                name: ${{ parameters.name }}
                namespace: apps
                labels:
                  app: ${{ parameters.name }}
              spec:
                selector:
                  app: ${{ parameters.name }}
                ports:
                  - port: 80
                    targetPort: ${{ parameters.port }}
                    protocol: TCP
              ---
              # ALB Ingress with TLS (shared ALB, wildcard cert)
              # URL: https://${{ parameters.name }}.ai-enhanced-devops.com
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: ${{ parameters.name }}
                namespace: apps
                annotations:
                  alb.ingress.kubernetes.io/scheme: internet-facing
                  alb.ingress.kubernetes.io/target-type: ip
                  alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
                  alb.ingress.kubernetes.io/ssl-redirect: "443"
                  alb.ingress.kubernetes.io/backend-protocol: HTTP
                  alb.ingress.kubernetes.io/healthcheck-path: /
                  alb.ingress.kubernetes.io/group.name: kubeauto-ingress
                  alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-west-2:598274344262:certificate/151d10d0-1941-4fbf-bfd8-0e8c3be1a8d6
              spec:
                ingressClassName: alb
                rules:
                  - host: ${{ parameters.name }}.ai-enhanced-devops.com
                    http:
                      paths:
                        - path: /
                          pathType: Prefix
                          backend:
                            service:
                              name: ${{ parameters.name }}
                              port:
                                number: 80

              # Platform policies already cover this service:
              # - Network: ALB ingress allowed from VPC CIDR (10.0.0.0/16)
              # - Network: Intra-namespace communication allowed
              # - Network: OTel telemetry egress to monitoring:4317/4318
              # - Network: DNS egress to kube-system:53
              # - Security: Kyverno enforces non-root, resource limits, probes, labels
              # - Quotas: apps namespace limited to 10 pods, 4 CPU, 8Gi memory
        - id: register-catalog
          name: Register in Backstage Catalog
          action: catalog:register
          input:
            catalogInfoUrl: https://backstage.ai-enhanced-devops.com/catalog
            optional: true
      output:
        links:
          - title: View in Catalog
            url: /catalog/default/component/${{ parameters.name }}
          - title: Live URL
            url: https://${{ parameters.name }}.ai-enhanced-devops.com

  create-namespace-template.yaml: |
    apiVersion: scaffolder.backstage.io/v1beta3
    kind: Template
    metadata:
      name: create-namespace
      title: Create a New Namespace
      description: |
        Provisions a Kubernetes namespace with default-deny NetworkPolicies,
        resource quotas, RBAC bindings, and Pod Security Standards labels.
        All generated resources follow platform security baselines.
      tags:
        - kubernetes
        - namespace
        - security
    spec:
      owner: platform-team
      type: resource
      parameters:
        - title: Namespace Details
          required:
            - name
          properties:
            name:
              title: Namespace Name
              type: string
              description: Name for the new namespace (lowercase, alphanumeric with hyphens)
              pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
              ui:autofocus: true
            owner:
              title: Owner Team
              type: string
              default: platform-team
            maxPods:
              title: Max Pods
              type: integer
              description: Maximum number of pods allowed in this namespace
              default: 10
              minimum: 5
              maximum: 50
            cpuQuota:
              title: CPU Quota
              type: string
              description: Total CPU limit for the namespace
              default: "4"
              enum:
                - "2"
                - "4"
                - "8"
            memoryQuota:
              title: Memory Quota
              type: string
              description: Total memory limit for the namespace
              default: 8Gi
              enum:
                - 4Gi
                - 8Gi
                - 16Gi
      steps:
        - id: generate-namespace
          name: Generate Namespace Resources
          action: debug:log
          input:
            message: |
              Generated namespace resources for ${{ parameters.name }}:

              ---
              apiVersion: v1
              kind: Namespace
              metadata:
                name: ${{ parameters.name }}
                labels:
                  pod-security.kubernetes.io/enforce: baseline
                  pod-security.kubernetes.io/warn: restricted
              ---
              apiVersion: v1
              kind: ResourceQuota
              metadata:
                name: ${{ parameters.name }}-quota
                namespace: ${{ parameters.name }}
              spec:
                hard:
                  pods: "${{ parameters.maxPods }}"
                  requests.cpu: "${{ parameters.cpuQuota }}"
                  requests.memory: "${{ parameters.memoryQuota }}"
                  limits.cpu: "${{ parameters.cpuQuota }}"
                  limits.memory: "${{ parameters.memoryQuota }}"
              ---
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: default-deny-all
                namespace: ${{ parameters.name }}
              spec:
                podSelector: {}
                policyTypes:
                  - Ingress
                  - Egress
              ---
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: allow-dns
                namespace: ${{ parameters.name }}
              spec:
                podSelector: {}
                policyTypes:
                  - Egress
                egress:
                  - to:
                      - namespaceSelector:
                          matchLabels:
                            kubernetes.io/metadata.name: kube-system
                    ports:
                      - protocol: UDP
                        port: 53
                      - protocol: TCP
                        port: 53

  onboard-developer-template.yaml: |
    apiVersion: scaffolder.backstage.io/v1beta3
    kind: Template
    metadata:
      name: onboard-developer
      title: Onboard a New Developer
      description: |
        Registers a new developer in the Backstage catalog with GitHub identity,
        team membership, and platform access. Generates the necessary User entity
        and RBAC configuration.
      tags:
        - onboarding
        - rbac
        - recommended
    spec:
      owner: platform-team
      type: resource
      parameters:
        - title: Developer Details
          required:
            - githubUsername
            - team
          properties:
            githubUsername:
              title: GitHub Username
              type: string
              description: The developer's GitHub username (case-sensitive)
              ui:autofocus: true
            displayName:
              title: Display Name
              type: string
              description: Full name for display purposes
            team:
              title: Team
              type: string
              description: Team to assign the developer to
              default: platform-team
              enum:
                - platform-team
            argocdRole:
              title: ArgoCD Access Level
              type: string
              description: Level of access in ArgoCD
              default: readonly
              enum:
                - platform-admin
                - readonly
              enumNames:
                - Platform Admin (full access)
                - Read Only (view applications)
      steps:
        - id: generate-user
          name: Generate User Entity
          action: debug:log
          input:
            message: |
              Generated Backstage User entity:

              ---
              apiVersion: backstage.io/v1alpha1
              kind: User
              metadata:
                name: ${{ parameters.githubUsername | lower }}
                annotations:
                  github.com/user-login: ${{ parameters.githubUsername }}
              spec:
                memberOf:
                  - ${{ parameters.team }}

              ArgoCD RBAC addition:
                g, ${{ parameters.githubUsername }}, role:${{ parameters.argocdRole }}

              Next steps:
              1. Add the User entity to backstage/k8s/catalog-configmap.yaml
              2. Add the RBAC line to gitops/argocd/values.yaml
              3. Add the username to the Group members list
              4. Commit and push — ArgoCD will sync automatically

