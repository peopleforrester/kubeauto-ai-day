  apis.yaml: |
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: argocd-api
      title: ArgoCD REST API
      description: ArgoCD v3 REST API for application management, sync operations, and cluster configuration.
      tags:
        - rest
        - argocd
      links:
        - url: https://argocd.ai-enhanced-devops.com/swagger-ui
          title: Swagger UI
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: kubeauto-idp
      definition: |
        openapi: 3.0.0
        info:
          title: ArgoCD API
          version: v3.3.0
          description: ArgoCD REST API for GitOps application management
        servers:
          - url: https://argocd.ai-enhanced-devops.com/api/v1
        paths:
          /applications:
            get:
              summary: List all applications
              operationId: listApplications
              responses:
                '200':
                  description: List of ArgoCD applications
          /applications/{name}:
            get:
              summary: Get application details
              operationId: getApplication
              parameters:
                - name: name
                  in: path
                  required: true
                  schema:
                    type: string
              responses:
                '200':
                  description: Application details
          /applications/{name}/sync:
            post:
              summary: Sync an application
              operationId: syncApplication
              parameters:
                - name: name
                  in: path
                  required: true
                  schema:
                    type: string
              responses:
                '200':
                  description: Sync initiated
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: prometheus-api
      title: Prometheus Query API
      description: PromQL query API for metrics retrieval and alerting rule management.
      tags:
        - rest
        - prometheus
        - metrics
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: kubeauto-idp
      definition: |
        openapi: 3.0.0
        info:
          title: Prometheus API
          version: v2
          description: Prometheus HTTP query API
        servers:
          - url: http://prometheus-kube-prometheus-prometheus.monitoring:9090/api/v1
        paths:
          /query:
            get:
              summary: Instant query
              operationId: query
              parameters:
                - name: query
                  in: query
                  required: true
                  schema:
                    type: string
              responses:
                '200':
                  description: Query results
          /query_range:
            get:
              summary: Range query
              operationId: queryRange
              parameters:
                - name: query
                  in: query
                  required: true
                  schema:
                    type: string
                - name: start
                  in: query
                  required: true
                  schema:
                    type: string
                - name: end
                  in: query
                  required: true
                  schema:
                    type: string
                - name: step
                  in: query
                  required: true
                  schema:
                    type: string
              responses:
                '200':
                  description: Range query results
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: grafana-api
      title: Grafana HTTP API
      description: Grafana API for dashboard management, data source configuration, and alerting.
      tags:
        - rest
        - grafana
        - dashboards
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: kubeauto-idp
      definition: |
        openapi: 3.0.0
        info:
          title: Grafana API
          version: v12.3.3
          description: Grafana HTTP API for dashboard and data source management
        servers:
          - url: http://prometheus-grafana.monitoring/api
        paths:
          /search:
            get:
              summary: Search dashboards
              operationId: searchDashboards
              responses:
                '200':
                  description: Dashboard search results
          /datasources:
            get:
              summary: List data sources
              operationId: listDatasources
              responses:
                '200':
                  description: List of configured data sources
    ---
    apiVersion: backstage.io/v1alpha1
    kind: API
    metadata:
      name: sample-app-api
      title: Sample App API
      description: Flask application health and metrics endpoints with OpenTelemetry instrumentation.
      tags:
        - rest
        - flask
        - otel
    spec:
      type: openapi
      lifecycle: production
      owner: platform-team
      system: kubeauto-idp
      definition: |
        openapi: 3.0.0
        info:
          title: Sample App API
          version: v1.0.0
          description: Sample Flask application endpoints
        paths:
          /:
            get:
              summary: Health check
              operationId: healthCheck
              responses:
                '200':
                  description: Application is healthy
          /metrics:
            get:
              summary: Prometheus metrics endpoint
              operationId: getMetrics
              responses:
                '200':
                  description: Prometheus-format metrics

