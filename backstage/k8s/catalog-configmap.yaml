# ABOUTME: ConfigMap containing Backstage catalog entities and templates.
# ABOUTME: Mounted into Backstage pod for static file catalog locations.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-catalog
  namespace: backstage
data:
  catalog-info.yaml: |
    apiVersion: backstage.io/v1alpha1
    kind: Domain
    metadata:
      name: platform-engineering
      description: Cloud-native platform engineering domain
      tags:
        - platform
        - kubernetes
    spec:
      owner: platform-team
    ---
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: kubeauto-idp
      description: KubeAuto Day Internal Developer Platform on EKS
      tags:
        - kubernetes
        - eks
        - platform
        - cncf
      links:
        - url: https://argocd.ai-enhanced-devops.com
          title: ArgoCD Dashboard
          icon: dashboard
        - url: https://backstage.ai-enhanced-devops.com
          title: Developer Portal
          icon: catalog
    spec:
      owner: platform-team
      domain: platform-engineering

  sample-app.yaml: |
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: sample-app
      description: Sample Python Flask application with OpenTelemetry auto-instrumentation
      annotations:
        argocd/app-name: sample-app
        backstage.io/kubernetes-label-selector: "app=sample-app"
        backstage.io/kubernetes-namespace: apps
      tags:
        - python
        - flask
        - otel
      links:
        - url: https://backstage.ai-enhanced-devops.com/catalog/default/component/sample-app
          title: Catalog Page
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: kubeauto-idp
      providesApis:
        - sample-app-api

  platform-components.yaml: |
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: argocd
      title: ArgoCD
      description: GitOps continuous delivery engine (v3.3.0). Manages all cluster workloads via app-of-apps pattern with 30s reconciliation.
      annotations:
        argocd/app-name: app-of-apps
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/part-of=argocd"
        backstage.io/kubernetes-namespace: argocd
      tags:
        - gitops
        - cncf-graduated
        - argocd
      links:
        - url: https://argocd.ai-enhanced-devops.com
          title: ArgoCD UI
          icon: dashboard
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: kubeauto-idp
      providesApis:
        - argocd-api
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: prometheus
      title: Prometheus
      description: Metrics collection and alerting via kube-prometheus-stack (v82.1.0). Scrapes all platform components and application metrics.
      annotations:
        argocd/app-name: prometheus
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/name=kube-prometheus-stack-prometheus-operator"
        backstage.io/kubernetes-namespace: monitoring
      tags:
        - monitoring
        - cncf-graduated
        - prometheus
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: kubeauto-idp
      providesApis:
        - prometheus-api
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: grafana
      title: Grafana
      description: Observability dashboards (v12.3.3). Platform Overview dashboard with 8 panels covering cluster health, security events, and deployments.
      annotations:
        argocd/app-name: prometheus
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/name=grafana"
        backstage.io/kubernetes-namespace: monitoring
      tags:
        - monitoring
        - observability
        - grafana
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: kubeauto-idp
      providesApis:
        - grafana-api
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: kyverno
      title: Kyverno
      description: Kubernetes policy engine (v3.7.0). Enforces 6 security policies in apps namespace — resource limits, probes, non-root, no privilege escalation, registry allowlist, required labels.
      annotations:
        argocd/app-name: kyverno
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/part-of=kyverno"
        backstage.io/kubernetes-namespace: kyverno
      tags:
        - security
        - policy
        - cncf-graduated
        - kyverno
    spec:
      type: service
      lifecycle: production
      owner: platform-team
      system: kubeauto-idp
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: falco
      title: Falco
      description: Runtime security monitoring (v0.42.1, CNCF Graduated). eBPF-based syscall detection with 5 custom rules — write below /etc, sensitive file reads, crypto mining, EC2 metadata access, pod exec.
      annotations:
        argocd/app-name: falco
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/name=falco"
        backstage.io/kubernetes-namespace: security
      tags:
        - security
        - runtime
        - cncf-graduated
        - falco
        - ebpf
    spec:
      type: service
