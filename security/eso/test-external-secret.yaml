# ABOUTME: ExternalSecret that syncs kubeauto/test-secret from AWS Secrets Manager.
# ABOUTME: Creates a K8s Secret in apps namespace with username and password keys.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: test-secret
  namespace: apps
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: test-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: kubeauto/test-secret
        property: username
    - secretKey: password
      remoteRef:
        key: kubeauto/test-secret
        property: password
