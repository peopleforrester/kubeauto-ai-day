# ABOUTME: ExternalSecret syncing Grafana admin credentials from AWS Secrets Manager.
# ABOUTME: Creates the `grafana-admin-credentials` Secret consumed by kube-prometheus-stack.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: kubeauto/grafana-admin
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: kubeauto/grafana-admin
        property: admin-password
