# ABOUTME: ClusterSecretStore connecting ESO to AWS Secrets Manager.
# ABOUTME: Uses IRSA via ESO controller service account in platform namespace.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: platform
