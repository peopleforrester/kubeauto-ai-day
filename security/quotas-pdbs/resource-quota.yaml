# ABOUTME: ResourceQuota for apps namespace to limit resource consumption.
# ABOUTME: Caps at 20 pods, 8 CPU, 16Gi memory to support multi-team demo apps.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: apps-quota
  namespace: apps
  labels:
    app.kubernetes.io/part-of: kubeauto-idp
spec:
  hard:
    pods: "20"
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
