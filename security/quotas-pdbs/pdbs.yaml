# ABOUTME: PodDisruptionBudgets for platform components.
# ABOUTME: Ensures minimum availability during node maintenance or rolling updates.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: argocd-server-pdb
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kubeauto-idp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: argocd-repo-server-pdb
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kubeauto-idp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
---
