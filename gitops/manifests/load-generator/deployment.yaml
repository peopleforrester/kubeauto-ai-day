# ABOUTME: Kubernetes Deployment for the load-generator demo application.
# ABOUTME: Kyverno-compliant with security contexts, resource limits, and exec-based health probes (no port).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: apps
  labels:
    app: load-generator
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
        version: "1.0.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: load-generator
          image: 598274344262.dkr.ecr.us-west-2.amazonaws.com/kubeauto-load-generator:1.0.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            exec:
              command:
                - python
                - "-c"
                - "print('ok')"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - python
                - "-c"
                - "print('ok')"
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
