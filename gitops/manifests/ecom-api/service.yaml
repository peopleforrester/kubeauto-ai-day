# ABOUTME: Kubernetes Service for the ecom-api demo application.
# ABOUTME: Exposes the ecom-api deployment on port 80, forwarding to container port 8080.
---
apiVersion: v1
kind: Service
metadata:
  name: ecom-api
  namespace: apps
  labels:
    app: ecom-api
    version: "1.0.0"
spec:
  selector:
    app: ecom-api
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
