# ABOUTME: Kubernetes Service for the ecom-frontend demo application.
# ABOUTME: Exposes the ecom-frontend deployment on port 80, forwarding to container port 8080.
---
apiVersion: v1
kind: Service
metadata:
  name: ecom-frontend
  namespace: apps
  labels:
    app: ecom-frontend
    version: "1.0.0"
spec:
  selector:
    app: ecom-frontend
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
