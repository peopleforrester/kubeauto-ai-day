# ABOUTME: Service for the spider-party demo application.
# ABOUTME: ClusterIP service exposing port 80 targeting container port 8080.
---
apiVersion: v1
kind: Service
metadata:
  name: spider-party
  namespace: apps
  labels:
    app: spider-party
spec:
  type: ClusterIP
  selector:
    app: spider-party
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
