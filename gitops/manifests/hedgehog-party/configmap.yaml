# ABOUTME: ConfigMap containing themed HTML5 Canvas animation for hedgehog-party.
# ABOUTME: Mounted into nginx container to replace default index.html.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hedgehog-party-html
  namespace: apps
  labels:
    app: hedgehog-party
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedgehog Party at KubeAuto Day Europe 2026</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #0a200a; }
      canvas { display: block; }
      #stats {
        position: fixed; top: 10px; left: 10px;
        color: #c8a050; font-family: monospace; font-size: 14px;
        background: rgba(10,32,10,0.7); padding: 8px 12px; border-radius: 6px;
        border: 1px solid #5a4020; z-index: 10;
      }
      #instructions {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        color: #c8a050; font-family: monospace; font-size: 13px;
        background: rgba(10,32,10,0.8); padding: 12px 20px; border-radius: 8px;
        border: 1px solid #5a4020; text-align: center; z-index: 10;
        transition: opacity 1s;
      }
    </style>
    </head>
    <body>
    <div id="stats"></div>
    <div id="instructions">
      Click: Leaf Burst | Hold: Autumn Stream | Space: Chaos Mode<br>
      Hedgehogs follow your cursor through the forest
    </div>
    <canvas id="c"></canvas>
    <script>
    (function() {
      var canvas = document.getElementById('c');
      var ctx = canvas.getContext('2d');
      var W, H;
      var mouse = { x: 0, y: 0 };
      var mouseDown = false;
      var chaosMode = false;
      var hedgehogs = [];
      var particles = [];
      var leafTrails = 0;
      var stars = [];
      var PARTICLE_CAP = 2000;

      var autumnColors = ['#8B4513','#D2691E','#CD853F','#DAA520','#B8860B','#A0522D','#556B2F','#6B8E23','#F4A460','#D2B48C'];
      var leafColors = ['#8B4513','#D2691E','#DAA520','#CD853F','#A0522D','#B8860B'];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        initStars();
        var count = Math.min(14, Math.max(6, Math.floor((W * H) / 70000)));
        while (hedgehogs.length < count) hedgehogs.push(createHedgehog());
        while (hedgehogs.length > count) hedgehogs.pop();
      }

      function initStars() {
        stars = [];
        for (var i = 0; i < 60; i++) {
          stars.push({
            x: Math.random() * W, y: Math.random() * H,
            size: Math.random() * 2.5 + 1,
            pulse: Math.random() * Math.PI * 2,
            speed: Math.random() * 0.02 + 0.01,
            dx: (Math.random() - 0.5) * 0.3,
            dy: (Math.random() - 0.5) * 0.3,
            color: 'rgba(' + (180 + Math.floor(Math.random()*75)) + ',' + (160 + Math.floor(Math.random()*60)) + ',50,'
          });
        }
      }

      function createHedgehog() {
        return {
          x: Math.random() * W, y: Math.random() * H,
          vx: 0, vy: 0,
          size: 18 + Math.random() * 8,
          color: autumnColors[Math.floor(Math.random() * autumnColors.length)],
          spikeColor: '#5a3a1a',
          angle: Math.random() * Math.PI * 2,
          spikePhase: Math.random() * Math.PI * 2,
          legPhase: Math.random() * Math.PI * 2,
          eyeBlink: 0
        };
      }

      function drawHedgehog(h) {
        ctx.save();
        ctx.translate(h.x, h.y);
        var moveAngle = Math.atan2(h.vy, h.vx);
        var speed = Math.sqrt(h.vx * h.vx + h.vy * h.vy);
        if (speed > 0.5) h.angle = moveAngle;

        ctx.rotate(h.angle);

        // Legs
        var legOff = Math.sin(h.legPhase) * 3;
        ctx.fillStyle = '#3a2510';
        ctx.fillRect(-h.size * 0.5, h.size * 0.6, 5, 6 + legOff);
        ctx.fillRect(h.size * 0.2, h.size * 0.6, 5, 6 - legOff);
        ctx.fillRect(-h.size * 0.5, -h.size * 0.6 - 6 + legOff, 5, 6);
        ctx.fillRect(h.size * 0.2, -h.size * 0.6 - 6 - legOff, 5, 6);

        // Body
        ctx.beginPath();
        ctx.ellipse(0, 0, h.size, h.size * 0.75, 0, 0, Math.PI * 2);
        ctx.fillStyle = h.color;
        ctx.fill();

        // Spikes
        var spikeCount = 14;
        for (var i = 0; i < spikeCount; i++) {
          var a = (i / spikeCount) * Math.PI * 2;
          var spikeLen = h.size * 0.5 + Math.sin(h.spikePhase + i) * 2;
          var bx = Math.cos(a) * h.size;
          var by = Math.sin(a) * h.size * 0.75;
          var tx = Math.cos(a) * (h.size + spikeLen);
          var ty = Math.sin(a) * (h.size * 0.75 + spikeLen);
          var perpX = -Math.sin(a) * 3;
          var perpY = Math.cos(a) * 3;
          ctx.beginPath();
          ctx.moveTo(bx - perpX, by - perpY);
          ctx.lineTo(tx, ty);
          ctx.lineTo(bx + perpX, by + perpY);
          ctx.closePath();
          ctx.fillStyle = h.spikeColor;
          ctx.fill();
        }

        // Face
        ctx.beginPath();
        ctx.ellipse(h.size * 0.6, 0, h.size * 0.4, h.size * 0.35, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#d4a574';
        ctx.fill();

        // Eyes
        if (h.eyeBlink <= 0) {
          ctx.beginPath();
          ctx.arc(h.size * 0.7, -h.size * 0.12, 2.5, 0, Math.PI * 2);
          ctx.arc(h.size * 0.7, h.size * 0.12, 2.5, 0, Math.PI * 2);
          ctx.fillStyle = '#1a0a00';
          ctx.fill();
        } else {
          ctx.strokeStyle = '#1a0a00';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(h.size * 0.65, -h.size * 0.12);
          ctx.lineTo(h.size * 0.75, -h.size * 0.12);
          ctx.moveTo(h.size * 0.65, h.size * 0.12);
          ctx.lineTo(h.size * 0.75, h.size * 0.12);
          ctx.stroke();
        }

        // Nose
        ctx.beginPath();
        ctx.arc(h.size * 0.95, 0, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#2a1a0a';
        ctx.fill();

        ctx.restore();
      }

      function spawnLeafParticle(x, y, burst) {
        if (particles.length >= PARTICLE_CAP) return;
        var c = leafColors[Math.floor(Math.random() * leafColors.length)];
        var spd = burst ? (Math.random() * 6 + 2) : (Math.random() * 2 + 0.5);
        var ang = Math.random() * Math.PI * 2;
        particles.push({
          x: x, y: y,
          vx: Math.cos(ang) * spd,
          vy: Math.sin(ang) * spd,
          life: 1,
          decay: 0.008 + Math.random() * 0.012,
          size: 4 + Math.random() * 6,
          color: c,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.15,
          type: 'leaf'
        });
        leafTrails++;
      }

      function spawnSparkle(x, y) {
        if (particles.length >= PARTICLE_CAP) return;
        particles.push({
          x: x, y: y,
          vx: (Math.random() - 0.5) * 3,
          vy: (Math.random() - 0.5) * 3,
          life: 1,
          decay: 0.02 + Math.random() * 0.02,
          size: 2 + Math.random() * 3,
          color: autumnColors[Math.floor(Math.random() * autumnColors.length)],
          type: 'sparkle'
        });
      }

      function leafBurst(x, y) {
        for (var i = 0; i < 30; i++) spawnLeafParticle(x, y, true);
      }

      function update() {
        var tx = chaosMode ? Math.random() * W : mouse.x;
        var ty = chaosMode ? Math.random() * H : mouse.y;

        for (var i = 0; i < hedgehogs.length; i++) {
          var h = hedgehogs[i];
          var dx = tx - h.x;
          var dy = ty - h.y;
          var dist = Math.sqrt(dx * dx + dy * dy) || 1;
          var force = chaosMode ? 0.4 : 0.15;
          h.vx += (dx / dist) * force;
          h.vy += (dy / dist) * force;
          h.vx *= 0.92;
          h.vy *= 0.92;
          h.x += h.vx;
          h.y += h.vy;
          h.spikePhase += 0.05;
          h.legPhase += Math.sqrt(h.vx * h.vx + h.vy * h.vy) * 0.15;

          if (Math.random() < 0.005) h.eyeBlink = 10;
          if (h.eyeBlink > 0) h.eyeBlink--;

          if (h.x < 0) h.x = W;
          if (h.x > W) h.x = 0;
          if (h.y < 0) h.y = H;
          if (h.y > H) h.y = 0;

          if (Math.random() < 0.15) spawnLeafParticle(h.x - h.vx * 2, h.y - h.vy * 2, false);
        }

        if (mouseDown) {
          for (var j = 0; j < 5; j++) spawnLeafParticle(mouse.x + (Math.random()-0.5)*30, mouse.y + (Math.random()-0.5)*30, false);
          for (var j = 0; j < 2; j++) spawnSparkle(mouse.x + (Math.random()-0.5)*40, mouse.y + (Math.random()-0.5)*40);
        }

        for (var i = particles.length - 1; i >= 0; i--) {
          var p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.02;
          p.vx *= 0.99;
          p.life -= p.decay;
          if (p.rotation !== undefined) p.rotation += p.rotSpeed;
          if (p.life <= 0) particles.splice(i, 1);
        }
      }

      function draw() {
        ctx.fillStyle = '#0a200a';
        ctx.fillRect(0, 0, W, H);

        // Firefly stars
        var t = Date.now() * 0.001;
        for (var i = 0; i < stars.length; i++) {
          var s = stars[i];
          s.x += s.dx;
          s.y += s.dy;
          if (s.x < 0) s.x = W;
          if (s.x > W) s.x = 0;
          if (s.y < 0) s.y = H;
          if (s.y > H) s.y = 0;
          s.pulse += s.speed;
          var alpha = 0.3 + Math.sin(s.pulse) * 0.4;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
          ctx.fillStyle = s.color + Math.max(0, alpha).toFixed(2) + ')';
          ctx.fill();
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size * 3, 0, Math.PI * 2);
          ctx.fillStyle = s.color + (Math.max(0, alpha) * 0.15).toFixed(2) + ')';
          ctx.fill();
        }

        // Particles
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          ctx.globalAlpha = p.life;
          if (p.type === 'leaf') {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            ctx.strokeStyle = 'rgba(60,30,10,0.3)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(-p.size, 0);
            ctx.lineTo(p.size, 0);
            ctx.stroke();
            ctx.restore();
          } else {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }

        // Hedgehogs
        for (var i = 0; i < hedgehogs.length; i++) drawHedgehog(hedgehogs[i]);

        // Stats
        document.getElementById('stats').textContent =
          hedgehogs.length + ' hedgehogs | ' + particles.length + ' particles | ' + leafTrails + ' leaf trails';
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      window.addEventListener('resize', resize);
      canvas.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
      canvas.addEventListener('mousedown', function(e) { mouseDown = true; leafBurst(e.clientX, e.clientY); });
      canvas.addEventListener('mouseup', function() { mouseDown = false; });
      canvas.addEventListener('touchmove', function(e) { e.preventDefault(); mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }, {passive:false});
      canvas.addEventListener('touchstart', function(e) { mouseDown = true; mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; leafBurst(mouse.x, mouse.y); });
      canvas.addEventListener('touchend', function() { mouseDown = false; });
      window.addEventListener('keydown', function(e) { if (e.code === 'Space') { e.preventDefault(); chaosMode = !chaosMode; } });

      setTimeout(function() {
        var el = document.getElementById('instructions');
        if (el) el.style.opacity = '0';
        setTimeout(function() { if (el) el.style.display = 'none'; }, 1000);
      }, 6000);

      resize();
      mouse.x = W / 2;
      mouse.y = H / 2;
      loop();
    })();
    </script>
    </body>
    </html>
