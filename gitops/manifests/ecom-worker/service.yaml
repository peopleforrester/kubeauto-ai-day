# ABOUTME: Kubernetes Service for the ecom-worker demo application.
# ABOUTME: Exposes the ecom-worker deployment on port 80, forwarding to container port 8080.
---
apiVersion: v1
kind: Service
metadata:
  name: ecom-worker
  namespace: apps
  labels:
    app: ecom-worker
    version: "1.0.0"
spec:
  selector:
    app: ecom-worker
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
