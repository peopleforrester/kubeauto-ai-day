# ABOUTME: ArgoCD Application for the Unicorn Party visual demo app.
# ABOUTME: Nginx serving HTML5 canvas animation with dancing unicorns and sparkles.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: unicorn-party
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/peopleforrester/kubeauto-ai-day.git
    targetRevision: staging
    path: gitops/manifests/unicorn-party
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
