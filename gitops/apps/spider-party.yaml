# ABOUTME: ArgoCD Application for the spider-party demo app owned by ecommerce-team.
# ABOUTME: Deploys spider-party manifests to the apps namespace via GitOps.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spider-party
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/peopleforrester/kubeauto-ai-day.git
    targetRevision: staging
    path: gitops/manifests/spider-party
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
