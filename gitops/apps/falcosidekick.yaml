# ABOUTME: ArgoCD Application for Falcosidekick event forwarder.
# ABOUTME: Receives Falco alerts and exposes Prometheus metrics endpoint.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falcosidekick
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: falcosidekick
    repoURL: https://falcosecurity.github.io/charts
    targetRevision: "0.12.1"
    helm:
      valuesObject:
        config:
          prometheus:
            extralabels: ""
        webui:
          enabled: false
        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "2801"
          prometheus.io/path: "/metrics"
        replicaCount: 2
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
