# ABOUTME: ArgoCD Application for the E-Commerce API service.
# ABOUTME: Python Flask with OTel, serves products/orders, calls ecom-worker.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecom-api
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/peopleforrester/kubeauto-ai-day.git
    targetRevision: staging
    path: gitops/manifests/ecom-api
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
