# ABOUTME: ArgoCD Application for Backstage developer portal.
# ABOUTME: Deploys Backstage with static catalog locations and software templates.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: backstage
    repoURL: https://backstage.github.io/charts
    targetRevision: "2.6.3"
    helm:
      valuesObject:
        backstage:
          image:
            registry: ghcr.io
            repository: backstage/backstage
            tag: "1.9.1"
          extraVolumes:
            - name: catalog
              configMap:
                name: backstage-catalog
          extraVolumeMounts:
            - name: catalog
              mountPath: /app/catalog
          appConfig:
            app:
              title: KubeAuto Day IDP
              baseUrl: https://backstage.ai-enhanced-devops.com
            organization:
              name: KubeAuto Day
            backend:
              baseUrl: https://backstage.ai-enhanced-devops.com
              listen:
                port: 7007
              database:
                client: better-sqlite3
                connection: ":memory:"
            catalog:
              rules:
                - allow:
                    - Component
                    - System
                    - API
                    - Resource
                    - Location
                    - Template
              locations:
                - type: file
                  target: /app/catalog/catalog-info.yaml
                - type: file
                  target: /app/catalog/sample-app.yaml
                - type: file
                  target: /app/catalog/deploy-service-template.yaml
                - type: file
                  target: /app/catalog/create-namespace-template.yaml
            techdocs:
              builder: local
              generator:
                runIn: local
              publisher:
                type: local
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
        ingress:
          enabled: true
          className: alb
          annotations:
            alb.ingress.kubernetes.io/scheme: internet-facing
            alb.ingress.kubernetes.io/target-type: ip
            alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
            alb.ingress.kubernetes.io/ssl-redirect: "443"
            alb.ingress.kubernetes.io/backend-protocol: HTTP
            alb.ingress.kubernetes.io/healthcheck-path: /
            alb.ingress.kubernetes.io/group.name: kubeauto-ingress
            alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-west-2:598274344262:certificate/151d10d0-1941-4fbf-bfd8-0e8c3be1a8d6
          host: backstage.ai-enhanced-devops.com
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
