# ABOUTME: Allow DNS resolution from apps namespace to kube-dns.
# ABOUTME: Required for all workloads to resolve service and external names.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: apps
  labels:
    app.kubernetes.io/part-of: kubeauto-idp
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
