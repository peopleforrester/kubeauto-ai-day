# ABOUTME: Allow ingress to apps namespace from the ingress controller.
# ABOUTME: Permits traffic from AWS LB Controller in kube-system on HTTP/HTTPS ports.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: apps
  labels:
    app.kubernetes.io/part-of: kubeauto-idp
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 5000
